# Shred 1-min candles -> tick CSV for AmiBroker (Host B run config).
# Run: java [chronicle flags] -cp "target/classes;<cp>" _40c.nqUtilities.shred.ShredderMain shred-csv.properties
# To shred another year, change from/to and re-run (one CSV per run, named <csv.ticker>_<from>_<to>.csv).

mode = shred

# Frozen intelligence (built by `learn` on the tick host).
model.file = model/nifty1.profile.json

# 1-min candle source (read-only).
candle.db     = D:/Softwares/sqlite/nifty.db
candle.symbol = NIFTY

# Output: AmiBroker ASCII CSV into this folder.
output.format = csv
output.dir    = F:/NIFTY Data/Tick Data
csv.ticker    = NIFTY

# Inclusive IST date window to shred. This run: 2019-2024 into a separate file.
from = 2019-01-01
to   = 2024-12-31

# 0 = shred every bar in the range (no cap).
target.bars = 0
