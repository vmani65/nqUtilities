# Shredder pipeline configuration.
# Pass an alternate file as the first CLI argument; missing keys fall back to these defaults.

# Mode:
#   selftest  (default) closed loop on the tick DB: ticks -> bars -> shred -> verify
#   learn     Host A: build the behaviour model from the tick DB and freeze it to model.file
#   shred     Host B: load model.file and shred 1-min candles from candle.db (no tick DB needed)
mode = selftest

# learn/selftest tick source: sqlite (the nifty_ticks mirror) or queue (the live nqTicker
# Chronicle Queue = full tick history). selftest always uses sqlite.
source.type = sqlite

# Source SQLite database to read ticks from (read-only). Used by selftest, and by learn when
# source.type=sqlite.
source.db = C:/novaquant/data/sqlite/nifty_ticks.db

# nqTicker Chronicle Queue directory (read concurrently with the live gateway). Used by learn when
# source.type=queue. Reading needs the Chronicle JVM flags (see README). For queue learn the IST
# date window is set by from/to below (empty = whole history); days/target.bars are ignored.
queue.dir = C:/novaquant/data/ticks

# Output SQLite database for the shredded ticks (created / overwritten for this symbol).
output.db = C:/novaquant/data/sqlite/nifty_ticks_shredded.db

# Symbol to read from source and write to output.
symbol = NIFTY-1

# Most-recent trading days to scan for bars (selftest/learn).
days = 18

# Stop selecting once this many 1-minute bars have been gathered (selftest/learn day selection,
# and the shred-mode bar cap; <= 0 in shred = all bars in range).
target.bars = 5000

# Portable model file: written by learn, read by shred.
model.file = model/nifty1.profile.json

# shred mode: 1-min candle source DB (read-only), table candles(symbol, window_start, ...).
candle.db     = D:/Softwares/sqlite/nifty.db
candle.symbol = NIFTY

# Optional inclusive IST date window (yyyy-MM-dd): shred bounds the candles; queue-learn bounds the
# cycles scanned. Empty = all dates.
from =
to   =

# queue-learn stale filter: skip any day whose (capped) session has fewer than this many distinct
# ltps (a frozen/heartbeat day, not real trading). Set to 1 to keep every day.
learn.min.distinct.prices = 10

# queue-learn upper bound (IST HH:mm): drop ticks at/after this time so learning uses only the clean
# pre-freeze window. The AccelPix feed goes stale ~13:00 IST daily, so 13:00 keeps the live morning.
# Empty = full session (15:30).
learn.session.end = 13:00
