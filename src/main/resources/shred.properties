# Shredder pipeline configuration.
# Pass an alternate file as the first CLI argument; missing keys fall back to these defaults.

# Source SQLite database to read ticks from (read-only).
source.db = C:/novaquant/data/sqlite/nifty_ticks.db

# Output SQLite database for the shredded ticks (created / overwritten for this symbol).
output.db = C:/novaquant/data/sqlite/nifty_ticks_shredded.db

# Symbol to read from source and write to output.
symbol = NIFTY-1

# Most-recent trading days to scan for bars.
days = 18

# Stop selecting days once this many 1-minute bars have been gathered.
target.bars = 5000
